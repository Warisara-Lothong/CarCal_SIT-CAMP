<!DOCTYPE html>
<html lang="en">
 
<head>

<body>
    <div id="box" class="flex flex-col border border-black-500 px-96 py-10 gap-10 bg-blue-300 h-screen">
        <h1 class="text-center border rounded-xl bg-blue-200">ค่าน้ำมัน</h1>
        <select name="" id="fuel" class="border rounded-l">
            <option value="" disabled selected>type</option>
            <option value="42.45">GASSOHOL 95(42.45 บาท/ลิตร) </option>
            <option value="42.08">GASSOHOL 91(42. 08บาท/ลิตร) </option>

            <option value="40.20">DIESEL(40.20 บาท/ลิตร)</option>

        <input type="number" id="distance" placeholder="กรอกระยะทาง(กม.)" class="border rounded-l">
        <button onclick="carcal()" class="border border-zinc-200 bg-green-100 rounded-xl">
            calculate

        <p id="result" class="text-center bg-green-100 font-bold"></p>
